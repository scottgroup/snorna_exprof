# Defaults option for Running Snakemake

## General parameters
jobs: 999 # Never use more than 999 parallel jobs in total
use-conda: True
conda-frontend: conda

## Cluster parameters
immediate-submit: True
rerun-triggers: mtime
cluster: "python3 profile/slurmSubmit.py {dependencies}" # script for sbatch jobs
cluster-config: "config/cluster.yaml" # config parameters for each rule
notemp: True
keep-going: True


